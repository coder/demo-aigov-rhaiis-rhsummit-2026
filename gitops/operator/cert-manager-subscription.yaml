# cert-manager Operator for Red Hat OpenShift
# (the RH-certified, RH-supported build — NOT the upstream community
#  jetstack/cert-manager. We use RH-supported builds for every operator
#  in this demo where Red Hat ships one.)
#
# Package: openshift-cert-manager-operator
# Channel: stable-v1
# Source:  redhat-operators (Red Hat Operator catalog)
#
# After install, the operator deploys the actual cert-manager controllers
# into the `cert-manager` namespace.
---
apiVersion: v1
kind: Namespace
metadata:
  name: cert-manager-operator
  labels:
    openshift.io/cluster-monitoring: "true"
---
apiVersion: operators.coreos.com/v1
kind: OperatorGroup
metadata:
  name: openshift-cert-manager-operator
  namespace: cert-manager-operator
spec:
  targetNamespaces:
    - cert-manager-operator
  upgradeStrategy: Default
---
apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: openshift-cert-manager-operator
  namespace: cert-manager-operator
spec:
  channel: stable-v1
  installPlanApproval: Automatic
  name: openshift-cert-manager-operator
  source: redhat-operators
  sourceNamespace: openshift-marketplace
