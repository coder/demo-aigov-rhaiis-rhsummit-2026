# ClusterSecretStore — backing store for all ExternalSecret resources in the
# cluster. Points at AWS Secrets Manager via static IAM credentials stored in
# the `external-secrets` namespace.
#
# Pre-requisite Secret `aws-secrets-manager-creds` is created by the cluster
# Terraform's bootstrap step (it has the AWS provider). Production: replace
# with IRSA (IAM Roles for Service Accounts).
#
# Sync wave -1 — this MUST exist before any ExternalSecret resource that
# references it.
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-manager
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1
      auth:
        secretRef:
          accessKeyIDSecretRef:
            name: aws-secrets-manager-creds
            namespace: external-secrets
            key: access-key-id
          secretAccessKeySecretRef:
            name: aws-secrets-manager-creds
            namespace: external-secrets
            key: secret-access-key
