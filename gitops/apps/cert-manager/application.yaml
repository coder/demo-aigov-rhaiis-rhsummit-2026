# cert-manager runtime config — ClusterIssuers (Let's Encrypt prod + staging)
# and supporting resources.
#
# Pre-requisites NOT managed by Argo:
#   - cert-manager Operator must be installed (gitops/operator/cert-manager-subscription.yaml)
#   - The bootstrap step must have applied the ClusterIssuers with the
#     IAM role ARN (the `role` field in the Route 53 solver config).
#     This is done via `oc apply --server-side` in the bootstrap, and
#     Argo CD preserves it via RespectIgnoreDifferences below.
#
# Sync wave 0 — runs before any app that depends on a Certificate.
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cert-manager
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    repoURL: https://github.com/coder/demo-aigov-rhaiis-rhsummit-2026.git
    targetRevision: main
    path: manifests/cert-manager
  destination:
    server: https://kubernetes.default.svc
    namespace: cert-manager
  # The bootstrap step applies the ClusterIssuers with the IAM role ARN
  # (environment-specific, not committed to git). These ignore rules
  # prevent Argo CD from reverting the role field during self-heal syncs.
  ignoreDifferences:
    - group: cert-manager.io
      kind: ClusterIssuer
      jsonPointers:
        - /spec/acme/solvers/0/dns01/route53/role
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
    retry:
      limit: 5
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 5m
