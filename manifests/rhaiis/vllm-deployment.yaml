# Red Hat AI Inference Server (RHAIIS) — OpenAI-compatible inference endpoint
#
# Demo-grade Deployment running on a GPU node. Hardening (STIG, FIPS,
# restricted-v2 overrides, readOnlyRootFilesystem) is intentionally NOT
# applied here — booth demo values simplicity. OCP applies its baseline
# restricted-v2 SCC by default which is sufficient for the demo.
# Production deployments should re-add explicit hardening; see
# docs/architecture.md.
#
# Verified to expose:
#   POST /v1/chat/completions   (with tools / tool_choice for tool-calling)
#   POST /v1/completions
#   POST /v1/embeddings
#   GET  /v1/models
#
# Tool-call support requires the right per-model parser. This example uses
# `granite` for IBM Granite-3.1-8B-Instruct. Alternates:
#   --tool-call-parser hermes        (Qwen2.5 / Qwen2.5-Coder, OpenHermes)
#   --tool-call-parser llama3_json   (Llama-3.1+ Instruct)
#   --tool-call-parser mistral       (Mistral / Mixtral Instruct)
#   --tool-call-parser deepseek      (DeepSeek-V3 / DeepSeek-Coder-V2.5+)
#
# GPU node placement: this Deployment ALWAYS runs on the cluster's GPU
# pool (provisioned by openshift-install via the `gpu` compute pool in
# install-config.yaml). The nodeSelector `nvidia.com/gpu.present=true` is
# auto-applied by the NVIDIA GPU operator's GPU Feature Discovery
# DaemonSet once drivers are loaded. No CPU fallback path — RHAIIS
# requires the GPU to be ready before pods schedule.
#
# Pull-secret expectation: a `redhat-pull-secret` of type
# kubernetes.io/dockerconfigjson exists in this namespace, sourced from
# your Red Hat partner subscription (registry.redhat.io). Created at
# cluster-bootstrap time by terraform/main.tf's gitops_bootstrap step.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm
  namespace: ocp-ai
  labels:
    app.kubernetes.io/name: vllm
    app.kubernetes.io/component: inference
    app.kubernetes.io/part-of: coder-aigov-demo
spec:
  replicas: 1
  strategy:
    type: Recreate                  # model load is heavy; avoid double-warmup
  selector:
    matchLabels:
      app.kubernetes.io/name: vllm
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vllm
        app.kubernetes.io/component: inference
    spec:
      imagePullSecrets:
        - name: redhat-pull-secret
      # Land on the GPU node only. The label is auto-applied by the
      # NVIDIA GPU operator's GPU Feature Discovery DaemonSet after
      # drivers are running.
      nodeSelector:
        nvidia.com/gpu.present: "true"
      containers:
        - name: vllm
          # CUDA-enabled RHAIIS image. `latest` per RH Summit 2026 demo
          # preference; pin to a specific tag for production after
          # verifying tool-call parser support.
          image: registry.redhat.io/rhoai/vllm-cuda-rhel9:latest
          imagePullPolicy: Always
          args:
            - --model
            - ibm-granite/granite-3.1-8b-instruct
            - --tool-call-parser
            - granite
            - --enable-auto-tool-choice
            - --host
            - 0.0.0.0
            - --port
            - "8000"
            - --max-model-len
            - "8192"
            - --disable-log-requests
            - --tensor-parallel-size
            - "1"            # 1 GPU per pod; A10G handles 8B fp16 alone
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: HF_HOME
              value: /tmp/hf-cache
            - name: HF_HUB_OFFLINE
              value: "0"
            - name: NVIDIA_VISIBLE_DEVICES
              value: all
            - name: NVIDIA_DRIVER_CAPABILITIES
              value: compute,utility
          resources:
            requests:
              cpu: "2"
              memory: "8Gi"
              nvidia.com/gpu: "1"
            limits:
              cpu: "4"
              memory: "16Gi"
              nvidia.com/gpu: "1"
          readinessProbe:
            httpGet:
              path: /v1/models
              port: http
            initialDelaySeconds: 60     # first model load takes a minute
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /v1/models
              port: http
            initialDelaySeconds: 180
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 4
          volumeMounts:
            - name: hf-cache
              mountPath: /tmp/hf-cache
            - name: shm
              mountPath: /dev/shm
      volumes:
        - name: hf-cache
          emptyDir:
            sizeLimit: 30Gi              # 8B fp16 ≈ 16GB; leave headroom
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 2Gi
---
apiVersion: v1
kind: Service
metadata:
  name: vllm
  namespace: ocp-ai
  labels:
    app.kubernetes.io/name: vllm
    app.kubernetes.io/part-of: coder-aigov-demo
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: vllm
  ports:
    - name: http
      port: 8000
      targetPort: http
