name: Build + push workspace images

on:
  push:
    branches: [main]
    paths:
      - "coder-templates/**/Dockerfile"
      - "coder-templates/**/images/**"
      - ".github/workflows/build-images.yml"
  workflow_dispatch:
    inputs:
      template:
        description: "Template directory to build (e.g., openshift-ai-gov)"
        required: true
        default: "openshift-ai-gov"

permissions:
  id-token: write           # required for OIDC role assumption
  contents: read

env:
  AWS_REGION: us-east-1
  ECR_REPO_PREFIX: demo-aigov

jobs:
  build:
    name: Build + push to ECR
    runs-on: ubuntu-latest
    strategy:
      matrix:
        template: ${{ fromJSON(inputs.template && format('["{0}"]', inputs.template) || '["openshift-ai-gov"]') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build + push
        uses: docker/build-push-action@v6
        with:
          context: coder-templates/${{ matrix.template }}/images
          file: coder-templates/${{ matrix.template }}/images/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPO_PREFIX }}/${{ matrix.template }}-base:latest
            ${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPO_PREFIX }}/${{ matrix.template }}-base:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          echo "## Pushed image" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPO_PREFIX }}/${{ matrix.template }}-base:latest\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPO_PREFIX }}/${{ matrix.template }}-base:${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
