# Coder Agent Firewalls — example rules file
#
# Process-level egress policy applied to autonomous coding agents inside Coder
# workspaces. Apply at the workspace level (per-template) or at the org/group
# level depending on your governance model.
#
# Default behavior: deny everything not explicitly allowed.
# Per-domain methods: an empty methods list means "any HTTP method".
#
# Replace example domains with the actual endpoints your agents need to reach.
# Internal SVC DNS (e.g., vllm.ocp-ai.svc) is allowed for in-cluster sovereign
# inference via RHAIIS — agents reach the model without leaving the perimeter.

rules:
  # Source repos — read + write (PRs / pushes)
  - domain: github.example.com
    methods: [GET, POST, PUT, PATCH]

  # Internal package / container registry — read only
  - domain: registry.example.com
    methods: [GET]

  # Coder API itself (workspace metadata, task status)
  - domain: coder.example.com
    methods: [GET, POST]

  # Sovereign inference endpoint — RHAIIS / vLLM in-cluster
  # Used when AI Gateway routes to the on-cluster sovereign provider.
  - domain: vllm.ocp-ai.svc
    methods: [POST]

  # Add additional allowlisted endpoints below. Examples:
  #   - JFrog Artifactory:   artifactory.example.com   GET, POST, PUT
  #   - Internal docs site:  docs.example.com           GET
  #   - Vault for secrets:   vault.example.com          GET, POST
  #
  # Anything not listed above is denied at the process level and emits an
  # audit log entry with decision=deny, suitable for streaming to Loki / Splunk
  # / ELK via the Coder unified audit log format.
