# ExternalSecret — Coder DB URL
#
# Pulls the postgres connection string from AWS Secrets Manager
# (`demo-aigov/coder-db-url` — written there by the cluster Terraform from
# the RDS endpoint + random_password) and materializes it as the
# `coder-db-url` Secret in the `coder` namespace, keyed `url` — exactly
# what the Coder Helm chart's CODER_PG_CONNECTION_URL env var expects.
#
# Sync wave 0 — runs before the Coder Helm chart (wave 1).
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: coder-db-url
  namespace: coder
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: coder-db-url
    creationPolicy: Owner
  data:
    - secretKey: url
      remoteRef:
        key: demo-aigov/coder-db-url
