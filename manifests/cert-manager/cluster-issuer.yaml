# ACME (Let's Encrypt) ClusterIssuer using DNS-01 via AWS Route 53.
#
# DNS-01 (not HTTP-01) is required because we need wildcard certs
# (*.coder.apps.<fqdn>) for Coder's per-workspace subdomain apps.
#
# Authentication uses IAM roles, not static access keys. The cluster
# Terraform's bootstrap step applies these ClusterIssuers with the
# IAM role ARN populated in the `role` field. cert-manager uses
# ambient credentials (EC2 IMDS on the node) to AssumeRole into the
# cert-manager IAM role, which has scoped Route 53 permissions.
#
# The `role` field is managed by the bootstrap step (not in this file)
# because it contains an environment-specific IAM role ARN. The Argo CD
# cert-manager Application uses RespectIgnoreDifferences to preserve
# the bootstrap-applied role ARN across syncs.

apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: austen@coder.com   # update via the patch in gitops/apps/cert-manager
    privateKeySecretRef:
      name: letsencrypt-prod-account-key
    solvers:
      - dns01:
          route53:
            region: us-east-1
            # role: <set by bootstrap> — cert-manager uses IMDS to
            # AssumeRole into the cert-manager IAM role for Route 53.
---
# Staging issuer (Let's Encrypt staging). Use this for early dry-runs to avoid
# rate-limiting; switch Coder Certificate to letsencrypt-prod for booth day.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: austen@coder.com
    privateKeySecretRef:
      name: letsencrypt-staging-account-key
    solvers:
      - dns01:
          route53:
            region: us-east-1
            # role: <set by bootstrap> — same as above.
