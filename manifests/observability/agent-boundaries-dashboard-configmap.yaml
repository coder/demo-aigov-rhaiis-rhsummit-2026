              "direction": "backward",
              "editorMode": "code",
              "expr": "sum by (decision) (count_over_time({namespace=~`(coder|coder)`, logger=`coderd.agentrpc`} |= `boundary_request` | logfmt | decision=~`deny|allow` | owner=~`$owner` | domain=~`$domain` | template_id=~`$template_id` | template_version_id=~`$template_version_id` [$__range]))",
