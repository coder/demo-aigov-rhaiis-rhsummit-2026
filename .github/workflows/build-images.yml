name: Build + push workspace images

on:
  push:
    branches: [main]
    paths:
      - "coder-templates/**/Dockerfile"
      - "coder-templates/**/images/**"
      - ".github/workflows/build-images.yml"
  workflow_dispatch:
    inputs:
      template:
        description: "Template directory to build (e.g., openshift-ai-gov)"
        required: true
        default: "openshift-ai-gov"

permissions:
  contents: read
  packages: write           # required to push to GHCR

env:
  IMAGE_REGISTRY: ghcr.io/coder/demo-aigov-rhaiis-rhsummit-2026

jobs:
  build:
    name: Build + push to GHCR
    runs-on: ubuntu-latest
    strategy:
      matrix:
        template: ${{ fromJSON(inputs.template && format('["{0}"]', inputs.template) || '["openshift-ai-gov"]') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build + push
        uses: docker/build-push-action@v6
        with:
          context: coder-templates/${{ matrix.template }}/images
          file: coder-templates/${{ matrix.template }}/images/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE_REGISTRY }}/${{ matrix.template }}-base:latest
            ${{ env.IMAGE_REGISTRY }}/${{ matrix.template }}-base:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          echo "## Pushed image" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.IMAGE_REGISTRY }}/${{ matrix.template }}-base:latest\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.IMAGE_REGISTRY }}/${{ matrix.template }}-base:${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
