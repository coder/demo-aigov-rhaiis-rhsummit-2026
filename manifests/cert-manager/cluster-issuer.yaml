# ACME (Let's Encrypt) ClusterIssuer using DNS-01 via AWS Route 53.
#
# DNS-01 (not HTTP-01) is required because we need wildcard certs
# (*.coder.apps.<fqdn>) for Coder's per-workspace subdomain apps.
#
# Authentication uses IRSA (IAM Roles for Service Accounts). The cluster
# runs in STS mode with a pod identity webhook that injects AWS_ROLE_ARN
# and AWS_WEB_IDENTITY_TOKEN_FILE into the cert-manager pod based on
# the eks.amazonaws.com/role-arn annotation on its ServiceAccount.
#
# The route53 solver section is intentionally minimal. Per the cert-manager
# docs: "Regardless of which ambient mechanism you use, the route53
# section is left empty, because cert-manager can find the credentials,
# role, and region by looking for environment variables."
#
# The ServiceAccount annotation is applied by the cluster Terraform's
# bootstrap step. Do NOT add static access keys here.

apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: austen@coder.com
    privateKeySecretRef:
      name: letsencrypt-prod-account-key
    solvers:
      - dns01:
          route53:
            region: us-east-1
---
# Staging issuer (Let's Encrypt staging). Use this for early dry-runs to avoid
# rate-limiting; switch Coder Certificate to letsencrypt-prod for booth day.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: austen@coder.com
    privateKeySecretRef:
      name: letsencrypt-staging-account-key
    solvers:
      - dns01:
          route53:
            region: us-east-1
