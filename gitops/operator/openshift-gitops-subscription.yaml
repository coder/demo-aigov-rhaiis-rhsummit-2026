# Red Hat OpenShift GitOps operator (Argo CD)
#
# Installed in `openshift-operators` namespace by default; the operator
# spawns the actual Argo CD server in `openshift-gitops` automatically.
#
# Apply with: oc apply -f subscription.yaml
---
apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: openshift-gitops-operator
  namespace: openshift-operators
spec:
  channel: latest
  installPlanApproval: Automatic
  name: openshift-gitops-operator
  source: redhat-operators
  sourceNamespace: openshift-marketplace
