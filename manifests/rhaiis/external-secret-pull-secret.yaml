# ExternalSecret — Red Hat partner pull secret
#
# Pulls the partner pull-secret JSON from AWS Secrets Manager
# (`demo-aigov/redhat-pull-secret` — written there by the cluster Terraform
# from var.pull_secret_path) and materializes it as a
# kubernetes.io/dockerconfigjson Secret named `redhat-pull-secret` in the
# `ocp-ai` namespace. The RHAIIS / vLLM Deployment references this Secret
# via spec.template.spec.imagePullSecrets.
#
# Sync wave 0 — runs before the RHAIIS Deployment (wave 2).
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: redhat-pull-secret
  namespace: ocp-ai
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: redhat-pull-secret
    creationPolicy: Owner
    template:
      type: kubernetes.io/dockerconfigjson
      data:
        ".dockerconfigjson": "{{ .pullSecretJson }}"
  data:
    - secretKey: pullSecretJson
      remoteRef:
        key: demo-aigov/redhat-pull-secret
