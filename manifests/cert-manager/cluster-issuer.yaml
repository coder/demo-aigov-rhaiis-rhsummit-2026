# ACME (Let's Encrypt) ClusterIssuer using DNS-01 via AWS Route 53.
#
# DNS-01 (not HTTP-01) is required because we need wildcard certs
# (*.coder.apps.<fqdn>) for Coder's per-workspace subdomain apps.
#
# Pre-requisite Secret `route53-credentials` in the `cert-manager` namespace
# is created by the cluster Terraform's bootstrap step (it has the AWS
# provider). Do NOT commit those access keys to Git.
#
# Production: use IAM Roles for Service Accounts (IRSA) instead of static
# access keys. That requires installing OCP in STS / manual mode and
# wiring the Cloud Credential Operator. Out of scope for the booth.

apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: austen@coder.com   # update via the patch in gitops/apps/cert-manager
    privateKeySecretRef:
      name: letsencrypt-prod-account-key
    solvers:
      - dns01:
          route53:
            region: us-east-1
            # hostedZoneID intentionally omitted — cert-manager auto-discovers
            # the zone from the DNS name being challenged. Set explicitly if
            # your account has multiple zones with overlapping suffixes.
            accessKeyIDSecretRef:
              name: route53-credentials
              key: access-key-id
            secretAccessKeySecretRef:
              name: route53-credentials
              key: secret-access-key
---
# Staging issuer (Let's Encrypt staging). Use this for early dry-runs to avoid
# rate-limiting; switch Coder Certificate to letsencrypt-prod for booth day.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: austen@coder.com
    privateKeySecretRef:
      name: letsencrypt-staging-account-key
    solvers:
      - dns01:
          route53:
            region: us-east-1
            accessKeyIDSecretRef:
              name: route53-credentials
              key: access-key-id
            secretAccessKeySecretRef:
              name: route53-credentials
              key: secret-access-key
