# NodeFeatureDiscovery instance — tells the NFD operator to start the
# DaemonSet that labels nodes with their hardware features.
#
# Once running, every node carries labels like:
#   feature.node.kubernetes.io/pci-10de.present=true   ← NVIDIA card present
#   feature.node.kubernetes.io/cpu-cpuid.AVX2=true
#   ...
# The NVIDIA GPU operator's ClusterPolicy reconciler watches for the
# `pci-10de.present` label and rolls drivers onto matching nodes.
#
# We use the operator's default tuning — the booth demo doesn't need
# custom feature filters or topology rules.
apiVersion: nfd.openshift.io/v1
kind: NodeFeatureDiscovery
metadata:
  name: nfd-instance
  namespace: openshift-nfd
spec:
  instance: ""
  topologyUpdater: false
  operand:
    image: registry.redhat.io/openshift4/ose-node-feature-discovery-rhel9:v4.21
    imagePullPolicy: Always
    servicePort: 12000
  customConfig:
    configData: |
      - name: "openshift-default-rules"
        labels: {}
  workerConfig:
    configData: |
      core:
        sleepInterval: 60s
      sources:
        pci:
          deviceClassWhitelist:
            - "0200"   # network
            - "03"     # display (covers VGA + 3D, where GPUs live)
            - "12"     # processing accelerators
          deviceLabelFields:
            - "vendor"
