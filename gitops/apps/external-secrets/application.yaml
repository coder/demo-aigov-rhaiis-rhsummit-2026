# External Secrets Operator runtime config — ClusterSecretStore.
#
# Pre-requisites:
#   - ESO operator subscription installed (gitops/operator/external-secrets-subscription.yaml)
#   - Secret `aws-secrets-manager-creds` in the `external-secrets` namespace
#     (created by the cluster Terraform's bootstrap step)
#   - AWS Secrets Manager secrets `demo-aigov/coder-db-url` and
#     `demo-aigov/redhat-pull-secret` populated with their content (also
#     created by the cluster Terraform)
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  project: default
  source:
    repoURL: https://github.com/coder/demo-aigov-rhaiis-rhsummit-2026.git
    targetRevision: main
    path: manifests/external-secrets
  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 5m
