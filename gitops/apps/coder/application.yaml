# Coder — installed via the upstream Helm chart, latest RC for full Coder
# Agents Early Access functionality.
#
# Values are inline below. For the demo we accept a few simplifications vs.
# production:
#   - Postgres connection comes from the `coder-app` Secret that the
#     CloudNativePG operator auto-generates when it reconciles the
#     `Cluster` CR in `manifests/postgres/cluster.yaml` (sync wave 0).
#   - `restricted-v2` SCC defaults are NOT overridden (no STIG/FIPS posture)
#   - Wildcard route is created via the Coder chart's ingress.openshift section
#
# NOTES:
#   - The `coder-app` Secret is created automatically by CNPG — there is
#     no manual `oc create secret` step. Sync wave on the postgres app is
#     0; this Coder app is wave 1, so the Secret exists by the time these
#     pods boot.
#   - The chart version + image tag track Coder release-candidate releases.
#     Bump as new RCs ship. Linear: project `0e26deb1` (Coder Agents) —
#     verify the May Beta milestone before booth.
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: coder
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  source:
    repoURL: https://helm.coder.com/v2
    chart: coder
    targetRevision: 2.33.0-rc.3       # latest tagged RC (commit 3362b5ae, Apr 22 2026)
    helm:
      releaseName: coder
      values: |
        coder:
          image:
            repo: ghcr.io/coder/coder
            tag: v2.33.0-rc.3          # match chart targetRevision
            pullPolicy: IfNotPresent

          env:
            - name: CODER_ACCESS_URL
              value: "https://coder.apps.cluster.rh.coderdemo.io"   # update to your cluster_fqdn
            - name: CODER_WILDCARD_ACCESS_URL
              value: "*.coder.apps.cluster.rh.coderdemo.io"
            - name: CODER_PG_CONNECTION_URL
              valueFrom:
                secretKeyRef:
                  name: coder-app          # auto-generated by CNPG operator
                  key: uri
            - name: CODER_PROMETHEUS_ENABLE
              value: "true"
            # Coder Agents Early Access flag
            - name: CODER_EXPERIMENTS
              value: "agents"
            # Disable telemetry / direct connections for demo network
            - name: CODER_DISABLE_DIRECT_CONNECTIONS
              value: "true"
            - name: CODER_DISABLE_NETWORK_TELEMETRY
              value: "true"
            - name: CODER_DISABLE_USAGE_STATS
              value: "true"
            # ── Bedrock provider for AI Gateway ─────────────────────────
            # AI Gateway's Bedrock provider reads ambient AWS env vars
            # (per coder/coder #24397, v2.33-rc.3). Secret is created by
            # the cluster Terraform's bootstrap step.
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: bedrock-credentials
                  key: aws-access-key-id
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: bedrock-credentials
                  key: aws-secret-access-key
            - name: AWS_REGION
              valueFrom:
                secretKeyRef:
                  name: bedrock-credentials
                  key: aws-region

          replicaCount: 3     # multi-AZ HA — one pod per AZ via topology spread below

          # Use OpenShift Routes via the chart's built-in support
          ingress:
            enable: false      # We'll create OpenShift Route separately if needed

          serviceAccount:
            workspacePerms: true
            enableDeployments: true

          resources:
            requests:
              cpu: "1"
              memory: "2Gi"
            limits:
              cpu: "2"
              memory: "4Gi"

          # Spread the 3 Coder pods across the 3 OCP node AZs so a single AZ
          # outage takes at most one replica. Aurora Postgres failover (writer
          # endpoint repoint) is automatic and survives the same AZ event.
          topologySpreadConstraints:
            - maxSkew: 1
              topologyKey: topology.kubernetes.io/zone
              whenUnsatisfiable: DoNotSchedule
              labelSelector:
                matchLabels:
                  app.kubernetes.io/name: coder

          affinity:
            podAntiAffinity:
              preferredDuringSchedulingIgnoredDuringExecution:
                - weight: 100
                  podAffinityTerm:
                    labelSelector:
                      matchLabels:
                        app.kubernetes.io/name: coder
                    topologyKey: kubernetes.io/hostname

  destination:
    server: https://kubernetes.default.svc
    namespace: coder
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
