# External Secrets Operator (ESO)
#
# IMPORTANT — operator-policy exception:
# Every other operator in this demo is Red-Hat-engineered. ESO is the
# *community-operators* build (CNCF Sandbox project, NOT a Red Hat product).
# We accept this exception because:
#   1. Red Hat does not currently ship a first-party External Secrets Operator
#      (the RH-supported alternative for this use case is HashiCorp Vault on
#      OpenShift, which is heavyweight overkill for two demo secrets)
#   2. ESO appears as the integration pattern in several Red Hat validated-
#      patterns docs (multicluster-gitops, AAP+AWS-Secrets-Manager)
#   3. Booth simplicity wins for the demo; production customers should
#      revisit Vault if RH-strict support is required
#
# Channel `stable` tracks the latest stable upstream release. installPlanApproval
# is Automatic so the operator auto-updates within the channel — fine for a
# throwaway demo cluster, pin to a specific channel/version for production.
#
# Package: external-secrets-operator
# Source:  community-operators
# Channel: stable
---
apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: external-secrets-operator
  namespace: openshift-operators
spec:
  channel: stable
  installPlanApproval: Automatic
  name: external-secrets-operator
  source: community-operators
  sourceNamespace: openshift-marketplace
